name: Публикация itd-api-turnstile в npm

# Запускается при пуше тега вида turnstile-v1.2.3.
# Порядок выпуска:
#   npm version patch --workspace itd-api-turnstile --no-git-tag-version
#   git commit -am "itd-api-turnstile 0.0.2"
#   git tag turnstile-v0.0.2
#   git push --follow-tags
on:
  push:
    tags: ['turnstile-v*']

jobs:
  verify-tag:
    name: Тег совпадает с версией в turnstile/package.json
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Сверка тега и версии
        run: |
          TAG="${GITHUB_REF_NAME#turnstile-v}"
          PKG="$(node -p "require('./turnstile/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Тег turnstile-v$TAG не совпадает с версией $PKG в turnstile/package.json"
            exit 1
          fi
          echo "Публикуется версия $PKG"

  # Тот же набор проверок, что и у основного пакета: он покрывает оба.
  checks:
    needs: verify-tag
    uses: ./.github/workflows/checks.yml

  publish:
    name: Публикация
    needs: checks
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # Без этого права раннер не получит OIDC-токен и Trusted Publishing не сработает.
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          # Trusted Publishing требует Node не ниже 22.14.
          node-version: 24
          registry-url: https://registry.npmjs.org
          # Кеш пакетного менеджера в задаче публикации отключён по рекомендации npm.
          package-manager-cache: false

      - name: Обновление npm до версии с поддержкой Trusted Publishing
        run: |
          npm install -g npm@latest
          npm -v

      - run: npm ci

      # prepublishOnly пакета сам прогонит типы, тесты, сборку и check:pack — он же
      # и создаёт dist, которого в репозитории нет.
      - name: Публикация
        run: npm publish --workspace itd-api-turnstile
